name: UpgradeGUI
version: ${project.version}
main: io.github.sunglogbag81.upgradegui.UpgradeGuiPlugin
api-version: '1.20'
author: sunglogbag81
description: 단계별 결과 아이템 체인 기반 GUI 강화 플러그인
softdepend: [Citizens]
commands:
  강화:
    description: 강화 GUI를 엽니다.
    usage: /강화 [setup|reload|give|list]
    aliases: [upgradegui, upgrade]
permissions:
  upgradegui.use:
    description: 강화 GUI를 사용할 수 있습니다.
    default: true
  upgradegui.admin:
    description: 관리자 기능을 사용할 수 있습니다.
    default: op
  upgradegui.reload:
    description: 설정을 다시 불러옵니다.
    default: op
  upgradegui.give:
    description: 강화권을 지급합니다.
    default: op
  upgradegui.list:
    description: 강화권 목록을 봅니다.
    default: op
  upgradegui.setup:
    description: 단계별 결과 아이템 설정 GUI를 엽니다.
    default: op

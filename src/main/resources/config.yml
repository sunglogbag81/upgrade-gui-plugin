# ==============================================================
# UpgradeGUI 설정 파일
# - 강화 단계별 "결과 아이템"을 직접 등록해서 쓰는 방식입니다.
# - /강화 setup 으로 0강 ~ 최대강 아이템을 순서대로 넣어 저장하세요.
# - 강화 성공/하락/초기화 시 저장된 결과 아이템으로 통째로 교체됩니다.
# ==============================================================

gui:
  title: "&#ffb347강화소"
  size: 27
  item-slot: 11
  ticket-slot: 15
  preview-slot: 13
  apply-slot: 22
  filler-material: BLACK_STAINED_GLASS_PANE
  filler-name: " "
  preview-name: "&6강화 정보"
  preview-lore:
    - "&7왼쪽에 강화할 아이템, 오른쪽에 강화권을 넣어주세요."
    - "&7이 플러그인은 단계별 등록 아이템을 기준으로 동작합니다."
    - "&7현재 아이템 단계: &f%current_level%"
    - "&7성공 시 예상 단계: &f%next_level%"
    - "&7처리 지연: &f%delay_ticks% ticks"
  apply-name: "&a강화 실행"
  apply-lore:
    - "&7클릭하면 강화 판정이 시작됩니다."
    - "&7지연시간 후 결과 아이템으로 교체됩니다."
  processing-name: "&e강화 진행 중..."
  processing-lore:
    - "&7현재 단계: &f%current_level%"
    - "&7예상 다음 단계: &f%next_level%"
    - "&7남은 처리 시간: &f%delay_ticks% ticks"
  success-preview-name: "&a강화 성공"
  downgrade-preview-name: "&e강화 하락"
  destroy-preview-name: "&c강화 초기화"
  result-preview-lore:
    - "&7이전 단계: &f%current_level%"
    - "&7결과 단계: &f%next_level%"
    - "&7성공 확률: &f%success%"
    - "&7하락 확률: &f%downgrade%"
    - "&7초기화 확률: &f%destroy%"

setup-gui:
  title: "&#ffd166강화 단계 설정"
  size: 18
  placeholder-material: CHEST
  placeholder-name: "&e%level%강 결과 아이템 등록"
  placeholder-lore:
    - "&7여기에 %level%강 결과 아이템을 넣으세요."
    - "&7닫으면 설정에 저장되고 원본 아이템은 다시 돌려줍니다."
  info-material: BOOK
  info-name: "&6설정 방법"
  info-lore:
    - "&71) /강화 setup 실행"
    - "&72) 0강부터 %max_level%강까지 결과 아이템을 순서대로 넣기"
    - "&73) GUI를 닫으면 저장 완료"

features:
  require-permission: true
  close-return-items: true
  block-shift-move-into-gui: true
  allow-stack-size-one-only: true
  lock-gui-during-delay: true
  deliver-result-to-inventory-if-closed: true

sounds:
  open: BLOCK_ENCHANTMENT_TABLE_USE
  start: BLOCK_NOTE_BLOCK_PLING
  success: ENTITY_PLAYER_LEVELUP
  downgrade: ENTITY_EXPERIENCE_ORB_PICKUP
  destroy: ENTITY_ITEM_BREAK
  give: ENTITY_ITEM_PICKUP
  setup: BLOCK_CHEST_OPEN

messages:
  prefix: "&#ffb347[강화] &f"
  no-permission: "&c권한이 없습니다."
  player-only: "&c플레이어만 사용할 수 있습니다."
  config-reloaded: "&a설정을 다시 불러왔습니다."
  invalid-item: "&c왼쪽 칸에 강화할 아이템을 올려주세요."
  invalid-ticket: "&c오른쪽 칸에 올바른 강화권을 올려주세요."
  invalid-material: "&c이 아이템은 현재 강화 대상이 아닙니다."
  item-stack-not-supported: "&c강화는 1개짜리 아이템만 가능합니다."
  already-max-level: "&e이미 최대 강화 단계 아이템입니다."
  already-processing: "&e이미 강화 처리 중입니다. 잠시만 기다려주세요."
  processing-started: "&7강화가 시작되었습니다. %delay_ticks% ticks 후 결과가 적용됩니다."
  success: "&a강화 성공! %level%강 결과 아이템으로 변경되었습니다."
  downgrade: "&e강화 실패... %level%강 결과 아이템으로 하락했습니다."
  destroyed: "&c강화 실패! 0강 결과 아이템으로 초기화되었습니다."
  result-delivered: "&eGUI가 닫혀 있어 결과 아이템을 인벤토리로 지급했습니다."
  opened: "&7강화 GUI를 열었습니다."
  returned-items: "&e남은 아이템을 인벤토리로 반환했습니다."
  ticket-given: "&a%player%에게 %ticket% x%amount% 지급 완료"
  unknown-ticket: "&c강화권 키를 찾을 수 없습니다: %key%"
  unregistered-item: "&c이 아이템은 강화 단계 설정에 등록되어 있지 않습니다. /강화 setup 에서 먼저 등록하세요."
  missing-result-item: "&c%level%강 결과 아이템이 등록되어 있지 않습니다. /강화 setup 에서 채워주세요."
  setup-opened: "&e강화 단계 설정 GUI를 열었습니다. 0강부터 순서대로 넣고 닫으면 저장됩니다."
  setup-saved: "&a강화 단계 설정이 저장되었습니다. 등록된 단계 수: %configured_levels%"
  usage-admin: "&e/강화 | /강화 setup | /강화 reload | /강화 list | /강화 give <player> <ticket> [amount]"

citizens:
  enabled: false
  npc-ids: []
  require-permission: true

upgrade:
  # 최대 강화 단계. setup GUI에서는 0강 ~ max-level 까지 등록합니다.
  max-level: 10

  # 강화 버튼을 누른 뒤 결과가 반영되기까지의 지연시간
  # 20 ticks = 1초
  attempt-delay-ticks: 20

  # 비워두면 모든 재질 허용
  allowed-materials: []

  # 아래 재질은 강화 불가
  blocked-materials:
    - AIR

upgrade-tickets:
  basic:
    enabled: true
    material: PAPER
    display-name: "&#ffd166기본 강화권"
    lore:
      - "&7강화 GUI에서 사용할 기본 강화권입니다."
    custom-model-data:
    glowing: false

  premium:
    enabled: true
    material: ENCHANTED_BOOK
    display-name: "&#ffdf6b프리미엄 강화권"
    lore:
      - "&7서버 운영용 예시 강화권입니다."
    custom-model-data:
    glowing: true

# 단계별 확률 규칙
# 현재 0강 아이템을 넣고 강화하면 "0" 규칙을 사용해 1강 / 0강 판정을 합니다.
level-rules:
  "0":
    success: 100.0
    downgrade: 0.0
    destroy: 0.0
  "1":
    success: 90.0
    downgrade: 10.0
    destroy: 0.0
  "2":
    success: 80.0
    downgrade: 20.0
    destroy: 0.0
  "3":
    success: 70.0
    downgrade: 25.0
    destroy: 5.0
  "4":
    success: 60.0
    downgrade: 30.0
    destroy: 10.0
  "5":
    success: 50.0
    downgrade: 35.0
    destroy: 15.0
  "6":
    success: 45.0
    downgrade: 35.0
    destroy: 20.0
  "7":
    success: 35.0
    downgrade: 40.0
    destroy: 25.0
  "8":
    success: 30.0
    downgrade: 40.0
    destroy: 30.0
  "9":
    success: 20.0
    downgrade: 45.0
    destroy: 35.0

# /강화 setup 으로 저장되면 여기에 실제 아이템 정보가 자동으로 저장됩니다.
upgrade-item-chain: {}
